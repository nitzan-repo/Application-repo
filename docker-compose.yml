services:
  calculator-app:
    image: "${IMAGE_URI:?IMAGE_URI is required}:${IMAGE_TAG:?IMAGE_TAG is required}"
    container_name: calculator-app
    restart: unless-stopped

    ports:
      - "${APP_PORT:-5000}:5000"

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=2)"
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
